<div class="container">
    <app-sidebar></app-sidebar>

    <div class="content">
        <app-searchbar (weatherEvent)="getData($event)"></app-searchbar>

        <div class="dashboard-grid">
            <div class="left-column">
                <app-weather-card [data]="WeatherData"></app-weather-card>
                <app-hourly-forecast [data]="WeatherData"></app-hourly-forecast>
            </div>

            <div class="right-column">
                <app-highlights [data]="WeatherData"></app-highlights>
            </div>
        </div>
    </div>
</div>
