<div class="card" *ngIf="data">
    <div class="left">
        <h2>{{ data.location.name }}</h2>
        <h1>{{ data.current.temp }}°C</h1>
        <p>Feels like {{ data.current.feels_like }}°C</p>
        <p>Wind {{ data.current.wind }} km/h</p>
    </div>

    <div class="right">
        <div class="weather-emoji">{{ weatherIcon }}</div>
    </div>
</div>
